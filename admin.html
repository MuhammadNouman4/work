<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — ITMetaTech Portfolio</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body">

  <div class="admin-wrap">

    <div id="loginView" class="login-card">
      <div class="eyebrow">ITMetaTech</div>
      <h1>Admin sign in</h1>
      <form id="loginForm">
        <label>Email
          <input type="email" id="email" required autocomplete="username" />
        </label>
        <label>Password
          <input type="password" id="password" required autocomplete="current-password" />
        </label>
        <p id="loginError" class="error"></p>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign in</button>
      </form>
    </div>

    <div id="dashView" class="dash" style="display:none;">
      <div class="dash-header">
        <div>
          <div class="eyebrow">ITMetaTech</div>
          <h1>Project manager</h1>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
          <a href="index.html" class="btn btn-ghost-light">View site</a>
          <button id="logoutBtn" class="btn btn-ghost-light">Sign out</button>
        </div>
      </div>

      <p id="statusMsg" class="status-msg"></p>

      <div class="dash-grid">
        <div class="panel">
          <h2 id="formTitle">Add a project</h2>
          <form id="projectForm">
            <label>Title
              <input type="text" id="title" required />
            </label>
            <label>Category
              <input type="text" id="category" placeholder="e.g. Endless Arcade" />
            </label>
            <label>Description
              <textarea id="description" rows="3"></textarea>
            </label>
            <label>Image filename
              <input type="text" id="image" placeholder="sb.jpg — upload the file to assets/img/portfolio in the repo" required />
            </label>
            <label>Project link (optional)
              <input type="url" id="link" placeholder="https://..." />
            </label>
            <label class="checkbox-row">
              <input type="checkbox" id="featured" />
              Featured
            </label>
            <div style="display:flex; gap:12px;">
              <button type="submit" class="btn btn-primary">Save project</button>
              <button type="button" id="cancelEditBtn" class="btn btn-ghost-light" style="display:none;">Cancel edit</button>
            </div>
          </form>
        </div>

        <div class="panel">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Projects</h2>
            <button id="importBtn" class="btn btn-ghost-light" style="display:none;">Import starter projects</button>
          </div>
          <div id="projectList"></div>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
